<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Student Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand" href="#">Student Dashboard</a>
    </div>
</nav>

<!-- Dashboard Container -->
<div class="container mt-4">

    <h2 class="text-center mb-4">Student Dashboard</h2>

    <!-- Statistics Cards -->
    <div class="row g-4">

        <div class="col-md-3 col-sm-6">
            <div class="card text-center bg-primary text-white shadow">
                <div class="card-body">
                    <h5>Total Students</h5>
                    <h2>500</h2>
                </div>
            </div>
        </div>

        <div class="col-md-3 col-sm-6">
            <div class="card text-center bg-success text-white shadow">
                <div class="card-body">
                    <h5>Present Students</h5>
                    <h2>450</h2>
                </div>
            </div>
        </div>

        <div class="col-md-3 col-sm-6">
            <div class="card text-center bg-danger text-white shadow">
                <div class="card-body">
                    <h5>Absent Students</h5>
                    <h2>50</h2>
                </div>
            </div>
        </div>

        <div class="col-md-3 col-sm-6">
            <div class="card text-center bg-warning shadow">
                <div class="card-body">
                    <h5>Placements</h5>
                    <h2>320</h2>
                </div>
            </div>
        </div>

    </div>

    <!-- Search Bar -->
    <div class="row mt-5">
        <div class="col-md-6 mx-auto">
            <input
                type="text"
                id="searchInput"
                class="form-control"
                placeholder="🔍 Search by Roll No, Name or Branch">
                
        </div>
       
    </div>

    <!-- Student Table -->
    <div class="table-responsive mt-4">
        <table class="table table-bordered table-striped table-hover" id="studentTable">

            <thead class="table-dark">
                <tr>
                    <th>Roll No</th>
                    <th>Name</th>
                    <th>Branch</th>
                    <th>Attendance</th>
                </tr>
            </thead>

            <tbody>

                <tr>
                    <td>101</td>
                    <td>Nandini</td>
                    <td>CSE</td>
                    <td><span class="badge bg-success">95%</span></td>
                </tr>

                <tr>
                    <td>102</td>
                    <td>Rahul</td>
                    <td>ECE</td>
                    <td><span class="badge bg-warning">82%</span></td>
                </tr>

                <tr>
                    <td>103</td>
                    <td>Priya</td>
                    <td>EEE</td>
                    <td><span class="badge bg-danger">65%</span></td>
                </tr>

                <tr>
                    <td>104</td>
                    <td>Arjun</td>
                    <td>CSE</td>
                    <td><span class="badge bg-success">91%</span></td>
                </tr>

                <tr>
                    <td>105</td>
                    <td>Teja</td>
                    <td>MECH</td>
                    <td><span class="badge bg-success">88%</span></td>
                </tr>

                <tr>
                    <td>106</td>
                    <td>Sneha</td>
                    <td>ECE</td>
                    <td><span class="badge bg-warning">79%</span></td>
                </tr>

            </tbody>

        </table>
    </div>
 <a href="profile.html" class="btn btn-primary">
    View Profile
</a>

<a href="contact.html" class="btn btn-info">
    Contact Us
</a>
</div>

<!-- Search Function -->
<script>
document.getElementById("searchInput").addEventListener("keyup", function () {

    let filter = this.value.toLowerCase();

    let rows = document.querySelectorAll("#studentTable tbody tr");

    rows.forEach(function(row) {

        let rowText = row.textContent.toLowerCase();

        if (rowText.includes(filter)) {
            row.style.display = "";
        } else {
            row.style.display = "none";
        }

    });

});
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
